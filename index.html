<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Realistic WebVR Golf Prototype</title>
    
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;600&display=swap" rel="stylesheet">
    
    <!-- A-Frame and dependencies -->
    <script src="https://aframe.io/releases/1.4.2/aframe.min.js"></script>
    <script src="https://cdn.jsdelivr.net/gh/c-frame/aframe-physics-system@v4.2.2/dist/aframe-physics-system.min.js"></script>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/simplex-noise/2.4.0/simplex-noise.min.js"></script>
    
    <style>
        body { margin: 0; padding: 0; font-family: 'Inter', sans-serif; overflow: hidden; background-color: #87CEEB; }
        #ui-overlay { position: absolute; top: 24px; left: 24px; z-index: 100; pointer-events: none; }
        .glass-panel {
            background: rgba(10, 30, 10, 0.6);
            backdrop-filter: blur(12px); -webkit-backdrop-filter: blur(12px);
            border: 1px solid rgba(255, 255, 255, 0.1);
            border-radius: 12px; padding: 24px; color: #fff;
            box-shadow: 0 8px 32px 0 rgba(0, 0, 0, 0.5); max-width: 300px;
        }
        .glass-panel h1 {
            margin: 0 0 12px 0; font-size: 24px; font-weight: 600;
            color: #a5d6a7;
        }
        .glass-panel p { margin: 0 0 16px 0; font-size: 14px; line-height: 1.6; color: #eee; }
        .instruction-badge {
            display: flex; align-items: center; background: rgba(0, 0, 0, 0.4);
            padding: 8px 12px; border-radius: 6px; font-size: 13px;
            border: 1px solid rgba(255, 255, 255, 0.1); margin-bottom: 8px;
        }
        .instruction-badge strong { color: #a5d6a7; margin-right: 8px; font-weight: 600; }
        .a-enter-vr #ui-overlay { display: none; }
    </style>

    <script>
        const simplex = new SimplexNoise('golf-seed'); // Fixed seed for consistent terrain

        // Procedural Terrain Generator
        AFRAME.registerComponent('procedural-terrain', {
            schema: {
                size: { type: 'number', default: 200 },
                segments: { type: 'number', default: 128 },
                amplitude: { type: 'number', default: 5 }
            },
            init: function () {
                const data = this.data;
                // Create high-res plane
                const geometry = new THREE.PlaneGeometry(data.size, data.size, data.segments, data.segments);
                geometry.rotateX(-Math.PI / 2); // Lay flat (Y is up)

                const posAttribute = geometry.attributes.position;
                const v = new THREE.Vector3();

                for (let i = 0; i < posAttribute.count; i++) {
                    v.fromBufferAttribute(posAttribute, i);
                    
                    // Base large hills
                    let h = simplex.noise2D(v.x * 0.015, v.z * 0.015) * data.amplitude;
                    // Medium details
                    h += simplex.noise2D(v.x * 0.05, v.z * 0.05) * (data.amplitude * 0.3);
                    
                    // Create a fairway/tee area by flattening the center path
                    const distanceFromCenter = Math.abs(v.x);
                    let flattenFactor = 1.0;
                    
                    // Fairway path from Z=20 down to Z=-150
                    if (v.z < 20 && v.z > -150 && distanceFromCenter < 12) {
                        // Smooth blend out to hills
                        const blend = Math.max(0, (distanceFromCenter - 4) / 8); 
                        flattenFactor = blend;
                        
                        // Small undulations on fairway
                        h = (simplex.noise2D(v.x * 0.1, v.z * 0.1) * 0.2) + (h * flattenFactor);
                    } else if (distanceFromCenter < 20 && v.z < 20 && v.z > -150) {
                        // Rough
                        const blend = Math.max(0, (distanceFromCenter - 12) / 8);
                        h = h * (0.3 + 0.7 * blend);
                    }

                    // Keep tee box perfectly flat
                    if (v.x > -3 && v.x < 3 && v.z > -2 && v.z < 2) {
                        h = 0;
                    }
                    
                    // Keep green flat
                    const distToPin = Math.hypot(v.x - 0, v.z - (-80));
                    if (distToPin < 8) {
                        const blend = Math.max(0, (distToPin - 3) / 5);
                        h = h * blend; 
                    }

                    posAttribute.setY(i, h);
                }

                geometry.computeVertexNormals();

                // High quality seamless grass textures from Three.js examples (hosted reliably)
                const textureLoader = new THREE.TextureLoader();
                const diffuseMap = textureLoader.load('https://raw.githubusercontent.com/mrdoob/three.js/master/examples/textures/terrain/grasslight-big.jpg');
                const normalMap = textureLoader.load('https://raw.githubusercontent.com/mrdoob/three.js/master/examples/textures/terrain/grasslight-big-nm.jpg');
                
                diffuseMap.wrapS = THREE.RepeatWrapping;
                diffuseMap.wrapT = THREE.RepeatWrapping;
                diffuseMap.repeat.set(data.size / 4, data.size / 4); // High tiling for detail
                
                normalMap.wrapS = THREE.RepeatWrapping;
                normalMap.wrapT = THREE.RepeatWrapping;
                normalMap.repeat.set(data.size / 4, data.size / 4);

                const material = new THREE.MeshStandardMaterial({
                    map: diffuseMap,
                    normalMap: normalMap,
                    color: 0x88cc88, // Slight tint
                    roughness: 0.9,
                    metalness: 0.05
                });

                const mesh = new THREE.Mesh(geometry, material);
                mesh.receiveShadow = true;
                this.el.setObject3D('mesh', mesh);

                // Add physics: use static trimesh directly from our modified geometry
                // Wait for next tick so A-Frame registers the object3D before physics initializes
                setTimeout(() => {
                    this.el.setAttribute('static-body', { shape: 'mesh' });
                }, 10);
            }
        });

        // Procedural Forest Generator
        AFRAME.registerComponent('forest-generator', {
            schema: {
                treeCount: { type: 'number', default: 400 },
                spread: { type: 'number', default: 200 }
            },
            init: function () {
                const count = this.data.treeCount;
                
                // Create geometries and materials
                const trunkGeo = new THREE.CylinderGeometry(0.3, 0.5, 4, 7);
                trunkGeo.translate(0, 2, 0); // Pivot at base
                const trunkMat = new THREE.MeshStandardMaterial({ color: 0x5c4033, roughness: 0.9 });
                
                // We'll use intersecting planes for leaves to look realistic
                const leafGeo = new THREE.BufferGeometry();
                // Create a cluster of crossed planes
                const planes = [];
                for(let i=0; i<4; i++) {
                    const p = new THREE.PlaneGeometry(5, 5);
                    p.rotateY((Math.PI/4) * i);
                    planes.push(p);
                }
                const mergedLeaves = THREE.BufferGeometryUtils ? THREE.BufferGeometryUtils.mergeBufferGeometries(planes) : planes[0]; // Fallback if utils not loaded
                // Actually, without BufferGeometryUtils, let's just use spheres to avoid loading another external library. With good lighting it looks like dense foliage.
                const denseLeafGeo = new THREE.DodecahedronGeometry(2.5, 1);
                
                const leafMat = new THREE.MeshStandardMaterial({ 
                    color: 0x2d5a27, 
                    roughness: 1.0,
                    flatShading: true // Gives that slight stylized realism
                });

                // Instanced meshes for incredible performance
                const trunkInstanced = new THREE.InstancedMesh(trunkGeo, trunkMat, count);
                const leafInstanced = new THREE.InstancedMesh(denseLeafGeo, leafMat, count * 3); // 3 leaf clusters per tree
                
                trunkInstanced.castShadow = true;
                trunkInstanced.receiveShadow = true;
                leafInstanced.castShadow = true;
                leafInstanced.receiveShadow = true;

                const dummy = new THREE.Object3D();
                let leafIndex = 0;

                for (let i = 0; i < count; i++) {
                    // Random placement
                    let x = (Math.random() - 0.5) * this.data.spread;
                    let z = (Math.random() - 0.5) * this.data.spread;
                    
                    // Don't place trees in the fairway (x: -15 to 15, z: 20 to -150)
                    if (z < 20 && z > -150 && Math.abs(x) < 18) {
                        // Push them outside the fairway
                        x = (x > 0) ? x + 18 : x - 18;
                    }
                    // Don't place on tee
                    if (Math.hypot(x, z) < 5) continue;

                    // Get terrain height at this point
                    let h = simplex.noise2D(x * 0.015, z * 0.015) * 5;
                    h += simplex.noise2D(x * 0.05, z * 0.05) * 1.5;

                    const scale = 0.6 + Math.random() * 0.8;
                    
                    // Set Trunk
                    dummy.position.set(x, h, z);
                    dummy.rotation.set(0, Math.random() * Math.PI, 0);
                    dummy.scale.set(scale, scale * (0.8 + Math.random() * 0.4), scale);
                    dummy.updateMatrix();
                    trunkInstanced.setMatrixAt(i, dummy.matrix);

                    // Set Leaves
                    for(let j = 0; j < 3; j++) {
                        dummy.position.set(
                            x + (Math.random() - 0.5) * scale, 
                            h + dummy.scale.y * 3.5 + (Math.random() * 2), 
                            z + (Math.random() - 0.5) * scale
                        );
                        dummy.rotation.set(Math.random() * Math.PI, Math.random() * Math.PI, Math.random() * Math.PI);
                        dummy.scale.set(scale, scale, scale);
                        dummy.updateMatrix();
                        leafInstanced.setMatrixAt(leafIndex++, dummy.matrix);
                    }
                }

                trunkInstanced.instanceMatrix.needsUpdate = true;
                leafInstanced.instanceMatrix.needsUpdate = true;

                const group = new THREE.Group();
                group.add(trunkInstanced);
                group.add(leafInstanced);
                this.el.setObject3D('mesh', group);
            }
        });

        // Golf Club Physics Component
        AFRAME.registerComponent('golf-club', {
            schema: {
                ball: { type: 'selector', default: '#ball' },
                multiplier: { type: 'number', default: 6.0 }
            },
            init: function () {
                this.velocity = new THREE.Vector3();
                this.lastPosition = new THREE.Vector3();
                this.clubHead = new THREE.Vector3();
                this.ballPosition = new THREE.Vector3();
                this.canHit = true;
            },
            tick: function (time, timeDelta) {
                if (!timeDelta || !this.data.ball || !this.canHit) return;
                
                this.el.object3D.getWorldPosition(this.clubHead);
                if (this.lastPosition.length() === 0) {
                    this.lastPosition.copy(this.clubHead); return;
                }
                
                this.velocity.subVectors(this.clubHead, this.lastPosition).divideScalar(timeDelta / 1000);
                this.lastPosition.copy(this.clubHead);
                
                if (!this.data.ball.body) return;
                this.data.ball.object3D.getWorldPosition(this.ballPosition);
                
                const distance = this.clubHead.distanceTo(this.ballPosition);
                const speed = this.velocity.length();
                
                if (distance < 0.15 && speed > 0.8) {
                    const mass = this.data.ball.body.mass;
                    const forwardSpeed = Math.abs(this.velocity.z);
                    const force = new CANNON.Vec3(
                        this.velocity.x * this.data.multiplier * mass,
                        (this.velocity.y + forwardSpeed * 1.5) * this.data.multiplier * mass, 
                        this.velocity.z * this.data.multiplier * mass
                    );
                    
                    this.data.ball.body.applyImpulse(force, new CANNON.Vec3(0, 0, 0));
                    this.canHit = false;
                    setTimeout(() => { this.canHit = true; }, 1000);
                }
            }
        });

        // Desktop click-to-shoot
        AFRAME.registerComponent('desktop-golf-shot', {
            init: function () {
                this.el.addEventListener('click', () => {
                    if (this.el.body) {
                        this.el.body.velocity.set(0, 0, 0);
                        this.el.body.angularVelocity.set(0, 0, 0);
                        // Power ranges to make it interesting
                        const pwr = 6.0 + Math.random() * 4.0;
                        const force = new CANNON.Vec3((Math.random()-0.5)*0.5, 3.5, -pwr);
                        this.el.body.applyImpulse(force, new CANNON.Vec3(0, 0, 0));
                    }
                });
            }
        });

        // Reset ball if it goes too low
        AFRAME.registerComponent('ball-reset', {
            tick: function () {
                if (this.el.body && this.el.body.position.y < -10) {
                    this.el.body.position.set(0, 0.15, -0.5);
                    this.el.body.velocity.set(0, 0, 0);
                    this.el.body.angularVelocity.set(0, 0, 0);
                }
            }
        });
    </script>
</head>
<body>

    <div id="ui-overlay">
        <div class="glass-panel">
            <h1>WebVR Golf <span style="font-size: 14px; font-weight: normal; color: #aaa;">Realistic</span></h1>
            <p>Welcome to the procedural course.</p>
            <div class="instruction-badge"><strong>VR</strong> Swing your right controller.</div>
            <div class="instruction-badge"><strong>Desktop</strong> Click the ball to swing.</div>
        </div>
    </div>

    <!-- Physics debug disabled, gravity realistic -->
    <a-scene physics="debug: false; gravity: -9.8; driver: local">
        
        <!-- Sky & Atmosphere -->
        <a-sky color="#6fbcf0"></a-sky>
        
        <!-- Realistic Sun Light & Shadows -->
        <a-light type="directional" position="20 40 -10" target="#rig" castShadow="true" intensity="1.2" 
                 shadow="cameraVisible: false; mapSize: 4096; cameraRight: 50; cameraLeft: -50; cameraTop: 50; cameraBottom: -50; bias: -0.001"></a-light>
        <!-- Soft Hemisphere Light -->
        <a-light type="hemisphere" color="#ffffff" groundColor="#2e6623" intensity="0.5"></a-light>

        <!-- Procedural Terrain (Includes grass texturing and physics) -->
        <a-entity procedural-terrain></a-entity>
        
        <!-- Procedural Forest -->
        <a-entity forest-generator></a-entity>

        <!-- Tee Box Area -->
        <a-box position="0 0.005 -0.5" width="2" height="0.01" depth="1.5" color="#3a702b" shadow="receive: true"></a-box>
        <a-sphere position="-0.8 0.03 -0.2" radius="0.04" color="#ffffff"></a-sphere>
        <a-sphere position="0.8 0.03 -0.2" radius="0.04" color="#ffffff"></a-sphere>
        <a-cylinder position="0 0.02 -0.5" radius="0.005" height="0.04" color="#d2b48c"></a-cylinder>

        <!-- Golf Ball (Increased friction to roll nicely on grass) -->
        <a-sphere id="ball" 
                  dynamic-body="mass: 0.045; shape: sphere; sphereRadius: 0.043; bounce: 0.3; friction: 0.9; linearDamping: 0.5; angularDamping: 0.5" 
                  position="0 0.1 -0.5" 
                  radius="0.043" color="#ffffff" shadow="cast: true" 
                  class="clickable" desktop-golf-shot ball-reset>
        </a-sphere>

        <!-- The Hole (Z = -80) -->
        <a-entity position="0 0.01 -80">
            <!-- Pin Flag -->
            <a-cylinder position="0 1 0" radius="0.015" height="2" color="#eee" shadow="cast: true"></a-cylinder>
            <a-triangle position="0.3 1.8 0" vertex-a="0 0.2 0" vertex-b="0 -0.2 0" vertex-c="-0.3 0 0" color="#ff2222" side="double" shadow="cast: true"></a-triangle>
            <!-- Hole marker -->
            <a-cylinder position="0 0.01 0" radius="0.1" height="0.02" color="#000"></a-cylinder>
        </a-entity>

        <!-- VR Rig -->
        <a-entity id="rig" position="0 0 1">
            <a-camera position="0 1.6 0" wasd-controls="enabled: false">
                <a-entity cursor="fuse: false; rayOrigin: mouse;" raycaster="objects: .clickable"></a-entity>
            </a-camera>
            
            <a-entity laser-controls="hand: left" raycaster="objects: .clickable"></a-entity>
            <a-entity laser-controls="hand: right" raycaster="objects: .clickable">
                <a-entity position="0 0 0" rotation="-45 0 0">
                    <a-cylinder position="0 -0.6 0" radius="0.008" height="1.2" color="#silver" shadow="cast: true"></a-cylinder>
                    <a-cylinder position="0 0 0" radius="0.014" height="0.3" color="#222"></a-cylinder>
                    <a-box position="0 -1.2 0.03" width="0.07" height="0.035" depth="0.05" color="#ddd" shadow="cast: true" golf-club></a-box>
                </a-entity>
            </a-entity>
        </a-entity>
        
    </a-scene>
</body>
</html>
