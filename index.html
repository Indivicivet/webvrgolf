<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>WebVR Golf - Realistic Cannon Edition</title>
    
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;600&display=swap" rel="stylesheet">
    
    <script src="https://aframe.io/releases/1.4.2/aframe.min.js"></script>
    <script src="https://cdn.jsdelivr.net/gh/c-frame/aframe-physics-system@v4.2.2/dist/aframe-physics-system.min.js"></script>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/simplex-noise/2.4.0/simplex-noise.min.js"></script>
    
    <style>
        body { margin: 0; padding: 0; font-family: 'Inter', sans-serif; overflow: hidden; background-color: #000; }
        #ui-overlay { position: absolute; top: 24px; left: 24px; z-index: 100; pointer-events: none; }
        .glass-panel {
            background: rgba(10, 30, 15, 0.65);
            backdrop-filter: blur(16px); -webkit-backdrop-filter: blur(16px);
            border: 1px solid rgba(255, 255, 255, 0.1);
            border-radius: 12px; padding: 24px; color: #fff;
            box-shadow: 0 8px 32px 0 rgba(0, 0, 0, 0.5); max-width: 320px;
        }
        .glass-panel h1 { margin: 0 0 12px 0; font-size: 24px; font-weight: 600; color: #a5d6a7; }
        .glass-panel p { margin: 0 0 16px 0; font-size: 14px; line-height: 1.6; color: #eee; }
        .badge {
            background: rgba(0, 0, 0, 0.5); padding: 8px 12px; border-radius: 6px; 
            font-size: 13px; border: 1px solid rgba(255, 255, 255, 0.1); margin-bottom: 8px;
        }
        .badge strong { color: #a5d6a7; margin-right: 8px; font-weight: 600; }
        .a-enter-vr #ui-overlay { display: none; }
        #crosshair {
            position: absolute; top: 50%; left: 50%; transform: translate(-50%, -50%);
            width: 10px; height: 10px; border-radius: 50%; background: rgba(255, 255, 255, 0.5);
            pointer-events: none; z-index: 50; display: none;
        }
        @media (hover: hover) and (pointer: fine) { #crosshair { display: block; } }
        .a-enter-vr #crosshair { display: none; }
    </style>

    <script>
        const simplex = new SimplexNoise('vr-golf-seed');

        // Asset Generation Utilities (Canvas-based to avoid external dependencies breaking)
        const AssetGen = {
            createGrassTexture: function() {
                const canvas = document.createElement('canvas');
                canvas.width = 256; canvas.height = 256;
                const ctx = canvas.getContext('2d');
                // Draw multiple blades of grass
                for(let i=0; i<40; i++) {
                    ctx.beginPath();
                    const startX = Math.random() * 256;
                    ctx.moveTo(startX, 256);
                    ctx.quadraticCurveTo(startX + (Math.random()-0.5)*100, 100 + Math.random()*50, startX + (Math.random()-0.5)*150, Math.random()*50);
                    ctx.lineWidth = 4 + Math.random() * 6;
                    const green = 100 + Math.random() * 100;
                    ctx.strokeStyle = `rgba(30, ${green}, 30, 0.9)`;
                    ctx.stroke();
                }
                const tex = new THREE.CanvasTexture(canvas);
                tex.colorSpace = THREE.SRGBColorSpace;
                return tex;
            },
            createLeafTexture: function() {
                const canvas = document.createElement('canvas');
                canvas.width = 256; canvas.height = 256;
                const ctx = canvas.getContext('2d');
                // Draw a cluster of leaves
                for(let i=0; i<30; i++) {
                    ctx.beginPath();
                    const x = 128 + (Math.random()-0.5)*150;
                    const y = 128 + (Math.random()-0.5)*150;
                    const r = 20 + Math.random()*30;
                    ctx.arc(x, y, r, 0, Math.PI*2);
                    const green = 80 + Math.random() * 80;
                    ctx.fillStyle = `rgba(20, ${green}, 20, 0.8)`;
                    ctx.fill();
                }
                const tex = new THREE.CanvasTexture(canvas);
                tex.colorSpace = THREE.SRGBColorSpace;
                return tex;
            }
        };

        // Realistic Sky is now an asset. We don't need the sky-gradient shader anymore.
        // Terrain with Physics
        AFRAME.registerComponent('procedural-terrain', {
            schema: { size: { default: 200 }, segments: { default: 128 }, amplitude: { default: 6 } },
            init: function () {
                const data = this.data;
                const geometry = new THREE.PlaneGeometry(data.size, data.size, data.segments, data.segments);
                geometry.rotateX(-Math.PI / 2);

                const posAttribute = geometry.attributes.position;
                const v = new THREE.Vector3();

                for (let i = 0; i < posAttribute.count; i++) {
                    v.fromBufferAttribute(posAttribute, i);
                    
                    let h = simplex.noise2D(v.x * 0.015, v.z * 0.015) * data.amplitude;
                    h += simplex.noise2D(v.x * 0.05, v.z * 0.05) * (data.amplitude * 0.3);
                    
                    const distToCenter = Math.abs(v.x);
                    // Fairway
                    if (v.z < 20 && v.z > -150 && distToCenter < 12) {
                        h = (simplex.noise2D(v.x * 0.1, v.z * 0.1) * 0.2) + (h * Math.max(0, (distToCenter - 4) / 8));
                    }
                    // Tee
                    if (v.x > -4 && v.x < 4 && v.z > -3 && v.z < 3) h = 0;
                    // Green
                    const distToPin = Math.hypot(v.x, v.z - (-80));
                    if (distToPin < 8) h = h * Math.max(0, (distToPin - 3) / 5);

                    posAttribute.setY(i, h);
                }
                geometry.computeVertexNormals();

                // Ground textures via downloaded assets
                const tl = new THREE.TextureLoader();
                const diff = tl.load('assets/grass_diff.jpg');
                diff.wrapS = diff.wrapT = THREE.RepeatWrapping;
                diff.repeat.set(50, 50);

                // Use white color so it doesn't overly tint the realistic texture
                const mat = new THREE.MeshStandardMaterial({
                    map: diff, color: 0xffffff, roughness: 0.9, metalness: 0.0
                });

                const mesh = new THREE.Mesh(geometry, mat);
                mesh.receiveShadow = true;
                this.el.setObject3D('mesh', mesh);

                setTimeout(() => { this.el.setAttribute('static-body', { shape: 'mesh' }); }, 100);
            }
        });

        // Volumetric Grass Sprites
        AFRAME.registerComponent('grass-sprites', {
            init: function() {
                const count = 15000;
                const geo = new THREE.PlaneGeometry(1.5, 1.5);
                geo.translate(0, 0.75, 0); // Pivot at bottom

                const tex = new THREE.TextureLoader().load('assets/grass.png');
                const mat = new THREE.MeshStandardMaterial({
                    map: tex, transparent: true, alphaTest: 0.1, opacity: 0.85,
                    side: THREE.DoubleSide, roughness: 1.0, depthWrite: false, color: 0xaaffaa
                });

                const mesh = new THREE.InstancedMesh(geo, mat, count);
                const dummy = new THREE.Object3D();

                for(let i=0; i<count; i++) {
                    const x = (Math.random()-0.5) * 150;
                    const z = (Math.random()-0.5) * 150;
                    
                    let h = simplex.noise2D(x * 0.015, z * 0.015) * 6;
                    h += simplex.noise2D(x * 0.05, z * 0.05) * 1.8;
                    
                    // Don't place on tee/fairway/green where grass is short
                    if(Math.hypot(x, z) < 6) continue; // Tee
                    if(Math.hypot(x, z+80) < 10) continue; // Green
                    if(z < 20 && z > -100 && Math.abs(x) < 8) continue; // Fairway

                    dummy.position.set(x, h, z);
                    dummy.rotation.y = Math.random() * Math.PI;
                    // Lower scale Y to make grass shorter/wider as requested
                    const scaleX = 0.5 + Math.random() * 0.8;
                    const scaleY = 0.3 + Math.random() * 0.3; // Much lower vertically
                    dummy.scale.set(scaleX, scaleY, scaleX);
                    dummy.updateMatrix();
                    mesh.setMatrixAt(i, dummy.matrix);
                }
                
                mesh.instanceMatrix.needsUpdate = true;
                this.el.setObject3D('mesh', mesh);
            }
        });

        // Realistic Forest Generator using GLTF
        AFRAME.registerComponent('forest-generator', {
            init: function () {
                const count = 300;
                
                // Load the downloaded tree GLTF
                const loader = new THREE.GLTFLoader();
                loader.load('assets/tree.glb', (gltf) => {
                    // Extract mesh from GLTF
                    let treeMesh = null;
                    gltf.scene.traverse((child) => {
                        if (child.isMesh) {
                            treeMesh = child;
                            // Make material double sided if leaves
                            if (child.material) child.material.side = THREE.DoubleSide;
                        }
                    });

                    if (!treeMesh) return; // Fallback if format is weird

                    const instancedMesh = new THREE.InstancedMesh(treeMesh.geometry, treeMesh.material, count);
                    instancedMesh.castShadow = true;
                    instancedMesh.receiveShadow = true;

                    const dummy = new THREE.Object3D();
                    let idx = 0;

                    for (let i = 0; i < count; i++) {
                        let x = (Math.random() - 0.5) * 200;
                        let z = (Math.random() - 0.5) * 200;
                        
                        if (z < 30 && z > -150 && Math.abs(x) < 20) x = (x > 0) ? x + 20 : x - 20;
                        if (Math.hypot(x, z) < 10) continue;

                        let h = simplex.noise2D(x * 0.015, z * 0.015) * 6;
                        h += simplex.noise2D(x * 0.05, z * 0.05) * 1.8;

                        // The specific downloaded tree might be very large or small, adjusting scale
                        const scale = 0.05 + Math.random() * 0.04; 
                        
                        dummy.position.set(x, h, z);
                        dummy.rotation.set(0, Math.random() * Math.PI, 0);
                        dummy.scale.set(scale, scale * (0.8 + Math.random() * 0.4), scale);
                        dummy.updateMatrix();
                        instancedMesh.setMatrixAt(idx++, dummy.matrix);
                    }

                    instancedMesh.count = idx;
                    instancedMesh.instanceMatrix.needsUpdate = true;
                    this.el.setObject3D('mesh', instancedMesh);
                });
            }
        });

        // The New Golf Cannon Mechanic
        AFRAME.registerComponent('golf-cannon', {
            schema: { power: { default: 25.0 } }, // Cannon is strong!
            init: function () {
                const el = this.el;
                const fireSound = new Audio('https://raw.githubusercontent.com/mrdoob/three.js/master/examples/sounds/ping_pong_hit.ogg'); // Fallback sound

                const fire = () => {
                    const ball = document.querySelector('#ball');
                    if (!ball || !ball.body) return;

                    // Play sound
                    fireSound.currentTime = 0;
                    fireSound.play().catch(e => {});

                    // Get cannon's world position
                    const position = new THREE.Vector3();
                    el.object3D.getWorldPosition(position);
                    
                    // On desktop, the scene camera is much more reliable for looking direction
                    const direction = new THREE.Vector3(0, 0, -1);
                    if (document.querySelector('a-scene').is('vr-mode')) {
                        // In VR, the laser controller points down its own local -Z precisely
                        direction.applyQuaternion(el.object3D.getWorldQuaternion(new THREE.Quaternion()));
                    } else {
                        // On desktop, use the camera's actual world direction
                        el.sceneEl.camera.getWorldDirection(direction);
                    }

                    // Offset the ball slightly forward so it doesn't spawn inside the cannon
                    const spawnPos = position.clone().add(direction.clone().multiplyScalar(0.5));
                    
                    // Teleport ball to cannon tip
                    ball.body.position.copy(spawnPos);
                    ball.body.velocity.set(0,0,0);
                    ball.body.angularVelocity.set(0,0,0);

                    // Apply massive impulse along the normal tracking line
                    const mass = ball.body.mass;
                    const force = new CANNON.Vec3(
                        direction.x * this.data.power * mass,
                        direction.y * this.data.power * mass,
                        direction.z * this.data.power * mass
                    );
                    
                    ball.body.applyImpulse(force, new CANNON.Vec3(0, 0, 0));
                };

                // VR Trigger
                el.addEventListener('triggerdown', fire);
                
                // Desktop Mouse Click
                document.addEventListener('mousedown', (e) => {
                    if(!document.querySelector('a-scene').is('vr-mode')) fire();
                });
            }
        });

        // Reset ball bounds
        AFRAME.registerComponent('ball-reset', {
            tick: function () {
                if (this.el.body && this.el.body.position.y < -15) {
                    this.el.body.position.set(0, 0.15, -0.5);
                    this.el.body.velocity.set(0,0,0);
                }
            }
        });
    </script>
</head>
<body>

    <div id="ui-overlay">
        <div class="glass-panel">
            <h1>WebVR Golf <span style="font-size: 14px; color: #aaa;">Cannon Edition</span></h1>
            <p>Welcome to the procedural course.</p>
            <div class="badge"><strong>VR</strong> Pull the Right Trigger to fire a ball from your cannon.</div>
            <div class="badge"><strong>Desktop</strong> Click anywhere to fire a ball from the camera.</div>
        </div>
    </div>
    <div id="crosshair"></div>

    <a-scene physics="debug: false; gravity: -9.8; driver: local" renderer="antialias: true; colorManagement: true;">
        
        <!-- Beautiful Skybox via downloaded asset -->
        <a-sky src="assets/sky.jpg"></a-sky>
        
        <!-- Extremely Bright, Realistic Lighting -->
        <!-- The Sun -->
        <a-light type="directional" position="30 50 -20" target="#rig" castShadow="true" intensity="2.5" 
                 shadow="cameraVisible: false; mapSize: 4096; cameraRight: 60; cameraLeft: -60; cameraTop: 60; cameraBottom: -60; bias: -0.001"></a-light>
        <!-- Soft Ambient/Bounce Light -->
        <a-light type="hemisphere" color="#ffffff" groundColor="#3a702b" intensity="0.6"></a-light>

        <!-- Environment Elements -->
        <a-entity procedural-terrain></a-entity>
        <a-entity grass-sprites></a-entity>
        <a-entity forest-generator></a-entity>

        <!-- Tee Box Area -->
        <a-box position="0 0.005 -0.5" width="2" height="0.01" depth="1.5" color="#3a702b" shadow="receive: true"></a-box>
        <a-cylinder position="0 0.02 -0.5" radius="0.005" height="0.04" color="#d2b48c"></a-cylinder>

        <!-- Golf Ball (Physics heavily tuned for cannon speed) -->
        <a-sphere id="ball" 
                  dynamic-body="mass: 0.045; shape: sphere; sphereRadius: 0.043; bounce: 0.4; friction: 0.7; linearDamping: 0.2; angularDamping: 0.5" 
                  position="0 0.1 -0.5" radius="0.043" color="#ffffff" shadow="cast: true" ball-reset>
        </a-sphere>

        <!-- The Hole (Z = -80) -->
        <a-entity position="0 0.01 -80">
            <a-cylinder position="0 1 0" radius="0.015" height="2" color="#fff" shadow="cast: true"></a-cylinder>
            <a-triangle position="0.3 1.8 0" vertex-a="0 0.2 0" vertex-b="0 -0.2 0" vertex-c="-0.3 0 0" color="#ff2222" side="double" shadow="cast: true"></a-triangle>
            <a-cylinder position="0 0.01 0" radius="0.1" height="0.02" color="#000"></a-cylinder>
        </a-entity>

        <!-- VR Rig -->
        <a-entity id="rig" position="0 0 1">
            <!-- Camera -->
            <a-camera position="0 1.6 0" wasd-controls="enabled: false">
                <!-- Attach the cannon to the camera for desktop mode -->
                <a-entity id="desktop-cannon" position="0.2 -0.2 -0.4" rotation="0 0 0" visible="true" golf-cannon>
                    <!-- Metallic barrel -->
                    <a-cylinder position="0 0 0" rotation="90 0 0" radius="0.03" height="0.4" color="#778899" metalness="0.8" roughness="0.2"></a-cylinder>
                    <!-- Cannon base/grip -->
                    <a-box position="0 -0.05 0.15" width="0.04" height="0.1" depth="0.04" color="#222"></a-box>
                </a-entity>
            </a-camera>
            
            <!-- Attach the cannon script directly to the controller so it accurately gets the normal tracking line -->
            <a-entity laser-controls="hand: left"></a-entity>
            <a-entity laser-controls="hand: right" golf-cannon>
                <!-- Cosmetic cannon model attached to the hand -->
                <a-entity position="0 0 0" rotation="0 0 0">
                    <a-cylinder position="0 0 -0.2" rotation="90 0 0" radius="0.04" height="0.5" color="#778899" metalness="0.8" roughness="0.2" shadow="cast: true"></a-cylinder>
                    <a-box position="0 -0.05 0" width="0.05" height="0.15" depth="0.05" color="#222"></a-box>
                </a-entity>
            </a-entity>
        </a-entity>
        
    </a-scene>

    <script>
        // Hide desktop cannon when entering VR
        document.querySelector('a-scene').addEventListener('enter-vr', function () {
            document.querySelector('#desktop-cannon').setAttribute('visible', 'false');
            // Remove golf-cannon from desktop to prevent double firing
            document.querySelector('#desktop-cannon').removeAttribute('golf-cannon');
        });
        document.querySelector('a-scene').addEventListener('exit-vr', function () {
            document.querySelector('#desktop-cannon').setAttribute('visible', 'true');
            document.querySelector('#desktop-cannon').setAttribute('golf-cannon', '');
        });
    </script>
</body>
</html>
