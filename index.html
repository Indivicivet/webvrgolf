<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>WebVR Golf - Realistic Cannon Edition</title>
    
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;600&display=swap" rel="stylesheet">
    
    <script src="https://aframe.io/releases/1.4.2/aframe.min.js"></script>
    <script src="https://cdn.jsdelivr.net/gh/c-frame/aframe-physics-system@v4.2.2/dist/aframe-physics-system.min.js"></script>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/simplex-noise/2.4.0/simplex-noise.min.js"></script>
    
    <style>
        body { margin: 0; padding: 0; font-family: 'Inter', sans-serif; overflow: hidden; background-color: #000; }
        #ui-overlay { position: absolute; top: 24px; left: 24px; z-index: 100; pointer-events: none; }
        .glass-panel {
            background: rgba(10, 30, 15, 0.65);
            backdrop-filter: blur(16px); -webkit-backdrop-filter: blur(16px);
            border: 1px solid rgba(255, 255, 255, 0.1);
            border-radius: 12px; padding: 24px; color: #fff;
            box-shadow: 0 8px 32px 0 rgba(0, 0, 0, 0.5); max-width: 320px;
        }
        .glass-panel h1 { margin: 0 0 12px 0; font-size: 24px; font-weight: 600; color: #a5d6a7; }
        .glass-panel p { margin: 0 0 16px 0; font-size: 14px; line-height: 1.6; color: #eee; }
        .badge {
            background: rgba(0, 0, 0, 0.5); padding: 8px 12px; border-radius: 6px; 
            font-size: 13px; border: 1px solid rgba(255, 255, 255, 0.1); margin-bottom: 8px;
        }
        .badge strong { color: #a5d6a7; margin-right: 8px; font-weight: 600; }
        .a-enter-vr #ui-overlay { display: none; }
        #crosshair {
            position: absolute; top: 50%; left: 50%; transform: translate(-50%, -50%);
            width: 10px; height: 10px; border-radius: 50%; background: rgba(255, 255, 255, 0.5);
            pointer-events: none; z-index: 50; display: none;
        }
        @media (hover: hover) and (pointer: fine) { #crosshair { display: block; } }
        .a-enter-vr #crosshair { display: none; }
    </style>

    <script>
        const simplex = new SimplexNoise('vr-golf-seed');

        // Asset Generation Utilities (Canvas-based to avoid external dependencies breaking)
        const AssetGen = {
            createGrassTexture: function() {
                const canvas = document.createElement('canvas');
                canvas.width = 256; canvas.height = 256;
                const ctx = canvas.getContext('2d');
                // Draw multiple blades of grass
                for(let i=0; i<40; i++) {
                    ctx.beginPath();
                    const startX = Math.random() * 256;
                    ctx.moveTo(startX, 256);
                    ctx.quadraticCurveTo(startX + (Math.random()-0.5)*100, 100 + Math.random()*50, startX + (Math.random()-0.5)*150, Math.random()*50);
                    ctx.lineWidth = 4 + Math.random() * 6;
                    const green = 100 + Math.random() * 100;
                    ctx.strokeStyle = `rgba(30, ${green}, 30, 0.9)`;
                    ctx.stroke();
                }
                const tex = new THREE.CanvasTexture(canvas);
                tex.colorSpace = THREE.SRGBColorSpace;
                return tex;
            },
            createLeafTexture: function() {
                const canvas = document.createElement('canvas');
                canvas.width = 256; canvas.height = 256;
                const ctx = canvas.getContext('2d');
                // Draw a cluster of leaves
                for(let i=0; i<30; i++) {
                    ctx.beginPath();
                    const x = 128 + (Math.random()-0.5)*150;
                    const y = 128 + (Math.random()-0.5)*150;
                    const r = 20 + Math.random()*30;
                    ctx.arc(x, y, r, 0, Math.PI*2);
                    const green = 80 + Math.random() * 80;
                    ctx.fillStyle = `rgba(20, ${green}, 20, 0.8)`;
                    ctx.fill();
                }
                const tex = new THREE.CanvasTexture(canvas);
                tex.colorSpace = THREE.SRGBColorSpace;
                return tex;
            }
        };

        // Realistic Sky is now an asset. We don't need the sky-gradient shader anymore.
        // Terrain with Physics
        AFRAME.registerComponent('procedural-terrain', {
            schema: { size: { default: 200 }, segments: { default: 128 }, amplitude: { default: 6 } },
            init: function () {
                const data = this.data;
                const geometry = new THREE.PlaneGeometry(data.size, data.size, data.segments, data.segments);
                geometry.rotateX(-Math.PI / 2);

                const posAttribute = geometry.attributes.position;
                const v = new THREE.Vector3();

                for (let i = 0; i < posAttribute.count; i++) {
                    v.fromBufferAttribute(posAttribute, i);
                    
                    let h = simplex.noise2D(v.x * 0.015, v.z * 0.015) * data.amplitude;
                    h += simplex.noise2D(v.x * 0.05, v.z * 0.05) * (data.amplitude * 0.3);
                    
                    const distToCenter = Math.abs(v.x);
                    // Fairway
                    if (v.z < 20 && v.z > -150 && distToCenter < 12) {
                        h = (simplex.noise2D(v.x * 0.1, v.z * 0.1) * 0.2) + (h * Math.max(0, (distToCenter - 4) / 8));
                    }
                    // Tee
                    if (v.x > -4 && v.x < 4 && v.z > -3 && v.z < 3) h = 0;
                    // Green
                    const distToPin = Math.hypot(v.x, v.z - (-80));
                    if (distToPin < 8) h = h * Math.max(0, (distToPin - 3) / 5);

                    posAttribute.setY(i, h);
                }
                geometry.computeVertexNormals();

                // Ground textures via downloaded assets
                const tl = new THREE.TextureLoader();
                const diff = tl.load('assets/10450_Rectangular_Grass_Patch_L3.123c827d110a-1347-4381-9208-e4f735762647/10450_Rectangular_Grass_Patch_v1_Diffuse.jpg');
                diff.wrapS = diff.wrapT = THREE.RepeatWrapping;
                diff.repeat.set(50, 50);

                // Use white color so it doesn't overly tint the realistic texture
                const mat = new THREE.MeshStandardMaterial({
                    map: diff, color: 0xffffff, roughness: 0.9, metalness: 0.0
                });

                const mesh = new THREE.Mesh(geometry, mat);
                mesh.receiveShadow = true;
                this.el.setObject3D('mesh', mesh);

                setTimeout(() => { this.el.setAttribute('static-body', { shape: 'mesh' }); }, 100);
            }
        });

        // Volumetric Grass Sprites
        AFRAME.registerComponent('grass-sprites', {
            init: function() {
                const count = 0;
                return;
                
                // todo :: can we make grass good? revisit in the future
                const geo = new THREE.PlaneGeometry(1.5, 1.5);
                geo.translate(0, 0.75, 0); // Pivot at bottom

                const tex = AssetGen.createGrassTexture();
                const mat = new THREE.MeshStandardMaterial({
                    map: tex, transparent: true, alphaTest: 0.1, opacity: 0.85,
                    side: THREE.DoubleSide, roughness: 1.0, depthWrite: false, color: 0xaaffaa
                });

                const mesh = new THREE.InstancedMesh(geo, mat, count);
                const dummy = new THREE.Object3D();

                for(let i=0; i<count; i++) {
                    const x = (Math.random()-0.5) * 150;
                    const z = (Math.random()-0.5) * 150;
                    
                    let h = simplex.noise2D(x * 0.015, z * 0.015) * 6;
                    h += simplex.noise2D(x * 0.05, z * 0.05) * 1.8;
                    
                    // Don't place on tee/fairway/green where grass is short
                    if(Math.hypot(x, z) < 6) continue; // Tee
                    if(Math.hypot(x, z+80) < 10) continue; // Green
                    if(z < 20 && z > -100 && Math.abs(x) < 8) continue; // Fairway

                    dummy.position.set(x, h, z);
                    dummy.rotation.y = Math.random() * Math.PI;
                    // Lower scale Y to make grass shorter/wider as requested
                    const scaleX = 0.5 + Math.random() * 0.8;
                    const scaleY = 0.3 + Math.random() * 0.3; // Much lower vertically
                    dummy.scale.set(scaleX, scaleY, scaleX);
                    dummy.updateMatrix();
                    mesh.setMatrixAt(i, dummy.matrix);
                }
                
                mesh.instanceMatrix.needsUpdate = true;
                this.el.setObject3D('mesh', mesh);
            }
        });

        // Realistic Forest Generator using OBJ models
        AFRAME.registerComponent('forest-generator', {
            init: function () {
                const count = 150; // Reduced count slightly since these are individual entities
                const el = this.el;

                // Load tree geometries via standard A-Frame entities using our preloaded assets
                for (let i = 0; i < count; i++) {
                    let x = (Math.random() - 0.5) * 200;
                    let z = (Math.random() - 0.5) * 200;
                    
                    if (z < 30 && z > -150 && Math.abs(x) < 20) x = (x > 0) ? x + 20 : x - 20;
                    if (Math.hypot(x, z) < 10) continue;

                    let h = simplex.noise2D(x * 0.015, z * 0.015) * 6;
                    h += simplex.noise2D(x * 0.05, z * 0.05) * 1.8;

                    // Randomly pick a tree model
                    // todo :: tree1 is broken, needs splitting up into individual trees
                    // since right now it's just a full 3-tree scene
                    const useTree1 = Math.random() > 999;
                    // Adjusted scales (real-world units in meters)
                    const baseScale = useTree1 ? 0.5 : 3.0;
                    const scale = baseScale * (0.8 + Math.random() * 0.4);
                    
                    const treeEl = document.createElement('a-entity');
                    if (useTree1) {
                        treeEl.setAttribute('obj-model', 'obj: #tree1-obj; mtl: #tree1-mtl');
                    } else {
                        treeEl.setAttribute('obj-model', 'obj: #tree-obj; mtl: #tree-mtl');
                    }
                    
                    treeEl.setAttribute('position', `${x} ${h} ${z}`);
                    treeEl.setAttribute('rotation', `0 ${Math.random() * 360} 0`);
                    treeEl.setAttribute('scale', `${scale} ${scale * (0.8 + Math.random() * 0.4)} ${scale}`);
                    treeEl.setAttribute('shadow', 'cast: true; receive: true');
                    
                    el.appendChild(treeEl);
                }
            }
        });

        // The New Golf Cannon Mechanic
        AFRAME.registerComponent('golf-cannon', {
            schema: { power: { default: 25.0 } }, // Cannon is strong!
            init: function () {
                const el = this.el;
                const fireSound = new Audio('https://raw.githubusercontent.com/mrdoob/three.js/master/examples/sounds/ping_pong_hit.ogg'); // Fallback sound

                const fire = () => {
                    // Play sound
                    fireSound.currentTime = 0;
                    fireSound.play().catch(e => {});

                    // Get cannon's world position
                    const position = new THREE.Vector3();
                    el.object3D.getWorldPosition(position);
                    
                    // On desktop, the scene camera is much more reliable for looking direction
                    const direction = new THREE.Vector3(0, 0, -1);
                    if (document.querySelector('a-scene').is('vr-mode')) {
                        // In VR, the laser controller points down its own local -Z precisely
                        direction.applyQuaternion(el.object3D.getWorldQuaternion(new THREE.Quaternion()));
                    } else {
                        // On desktop, use the camera's actual world direction
                        el.sceneEl.camera.getWorldDirection(direction);
                    }

                    // Offset the ball slightly forward so it doesn't spawn inside the cannon
                    const spawnPos = position.clone().add(direction.clone().multiplyScalar(0.6));
                    
                    // Create dynamic golf ball entity
                    const newBall = document.createElement('a-sphere');
                    newBall.setAttribute('radius', '0.043');
                    newBall.setAttribute('color', '#ffffff');
                    newBall.setAttribute('shadow', 'cast: true');
                    
                    // Setup velocity to pass to our component
                    const vel = direction.clone().multiplyScalar(this.data.power);
                    
                    // Generate random bright neon color for the trail
                    const colors = ['#ff3366', '#33ff66', '#3366ff', '#ffff33', '#ff9933', '#cc33ff'];
                    const randomColor = colors[Math.floor(Math.random() * colors.length)];
                    
                    newBall.setAttribute('golf-ball', {
                        velocity: vel,
                        trailColor: randomColor
                    });
                    
                    // Initialize physics body on the dynamic ball
                    newBall.setAttribute('dynamic-body', 'mass: 0.045; shape: sphere; sphereRadius: 0.043; bounce: 0.4; friction: 0.7; linearDamping: 0.2; angularDamping: 0.5');
                    
                    // Set initial position
                    newBall.setAttribute('position', `${spawnPos.x} ${spawnPos.y} ${spawnPos.z}`);
                    
                    el.sceneEl.appendChild(newBall);
                };

                // VR Trigger
                el.addEventListener('triggerdown', fire);
                
                // Desktop Mouse Click (only register and fire if this is the desktop cannon instance)
                if (el.id === 'desktop-cannon') {
                    document.addEventListener('mousedown', (e) => {
                        if(!document.querySelector('a-scene').is('vr-mode')) fire();
                    });
                }
            }
        });

        // Dynamic Golf Ball Component (Handles physics, trail, HUD marker, and auto-cleanup)
        AFRAME.registerComponent('golf-ball', {
            schema: {
                velocity: { type: 'vec3' },
                trailColor: { default: '#ff3366' }
            },
            init: function() {
                this.points = [];
                this.maxPoints = 60;
                this.tickCount = 0;
                this.velocityApplied = false;

                // Create the trail line in Three.js (using dynamic buffer geometry)
                const geometry = new THREE.BufferGeometry();
                const positions = new Float32Array(this.maxPoints * 3);
                geometry.setAttribute('position', new THREE.BufferAttribute(positions, 3));
                
                const material = new THREE.LineBasicMaterial({
                    color: new THREE.Color(this.data.trailColor),
                    transparent: true,
                    opacity: 0.8,
                    linewidth: 3
                });
                
                this.trailLine = new THREE.Line(geometry, material);
                this.el.sceneEl.object3D.add(this.trailLine);

                // Create the Distance HUD Marker
                const marker = document.createElement('a-entity');

                // Glowing border plane (slightly larger, at the back)
                const border = document.createElement('a-plane');
                border.setAttribute('width', '1.24');
                border.setAttribute('height', '0.44');
                border.setAttribute('color', this.data.trailColor);
                border.setAttribute('material', 'shader: flat; depthTest: true');
                border.setAttribute('position', '0 0 -0.005');
                marker.appendChild(border);

                // Background plane (slightly smaller, in front)
                const bg = document.createElement('a-plane');
                bg.setAttribute('width', '1.2');
                bg.setAttribute('height', '0.4');
                bg.setAttribute('color', '#0a1e0f');
                bg.setAttribute('material', 'opacity: 0.85; transparent: true; shader: flat; depthTest: true');
                bg.setAttribute('position', '0 0 0');
                marker.appendChild(bg);

                // Text (using the robust default SDF Roboto font, in front of the background)
                const text = document.createElement('a-entity');
                text.setAttribute('text', {
                    value: '0.0 m',
                    align: 'center',
                    color: '#ffffff',
                    width: 2.5
                });
                text.setAttribute('position', '0 0 0.005');
                marker.appendChild(text);

                this.el.sceneEl.appendChild(marker);
                this.markerEl = marker;
                this.markerTextEl = text;

                this.spawnTime = Date.now();
            },
            tick: function() {
                if (!this.el.body) return;

                const pos = this.el.object3D.position;

                // Ensure initial velocity is applied to the CANNON body in the simulation step
                if (!this.velocityApplied) {
                    this.el.body.wakeUp();
                    const vel = this.data.velocity;
                    this.el.body.velocity.set(vel.x, vel.y, vel.z);
                    this.velocityApplied = true;
                }

                // Update Trail Points
                this.tickCount++;
                if (this.tickCount % 2 === 0) {
                    this.points.push(new THREE.Vector3().copy(pos));
                    if (this.points.length > this.maxPoints) {
                        this.points.shift();
                    }
                    
                    const positionAttribute = this.trailLine.geometry.attributes.position;
                    for (let i = 0; i < this.maxPoints; i++) {
                        const pt = this.points[i] || pos;
                        positionAttribute.setXYZ(i, pt.x, pt.y, pt.z);
                    }
                    positionAttribute.needsUpdate = true;
                    // Recompute bounding box and sphere so Three.js doesn't frustum-cull the line
                    this.trailLine.geometry.computeBoundingBox();
                    this.trailLine.geometry.computeBoundingSphere();
                    this.trailLine.geometry.setDrawRange(0, this.points.length);
                }

                // Update Distance HUD Marker
                if (this.markerEl && this.markerTextEl) {
                    // Position marker above the ball
                    const markerPos = pos.clone().add(new THREE.Vector3(0, 0.4, 0));
                    this.markerEl.object3D.position.copy(markerPos);

                    // Horizontal distance from Tee Box (0, 0.01, -0.5)
                    const distFromTee = Math.hypot(pos.x, pos.z + 0.5);
                    this.markerTextEl.setAttribute('text', 'value', `${distFromTee.toFixed(1)} m`);

                    // Billboarding: Look at camera so the front faces the user (no rotateY required)
                    const camera = this.el.sceneEl.camera;
                    if (camera) {
                        const cameraPos = new THREE.Vector3();
                        camera.getWorldPosition(cameraPos);
                        this.markerEl.object3D.lookAt(cameraPos);

                        const distToCam = markerPos.distanceTo(cameraPos);
                        const scale = Math.max(0.1, distToCam * 0.08);
                        this.markerEl.object3D.scale.set(scale, scale, scale);
                    }
                }

                // Out of bounds or lifetime cleanup
                if (pos.y < -15 || (Date.now() - this.spawnTime > 20000)) {
                    this.destroyBall();
                }
            },
            destroyBall: function() {
                if (this.trailLine) {
                    this.el.sceneEl.object3D.remove(this.trailLine);
                    this.trailLine.geometry.dispose();
                    this.trailLine.material.dispose();
                }
                if (this.markerEl && this.markerEl.parentNode) {
                    this.markerEl.parentNode.removeChild(this.markerEl);
                }
                if (this.el.parentNode) {
                    this.el.parentNode.removeChild(this.el);
                }
            }
        });
    </script>
</head>
<body>

    <div id="ui-overlay">
        <div class="glass-panel">
            <h1>WebVR Golf <span style="font-size: 14px; color: #aaa;">Cannon Edition</span></h1>
            <p>Welcome to the procedural course.</p>
            <div class="badge"><strong>VR</strong> Pull the Right Trigger to fire a ball from your cannon.</div>
            <div class="badge"><strong>Desktop</strong> Click anywhere to fire a ball from the camera.</div>
        </div>
    </div>
    <div id="crosshair"></div>

    <a-scene physics="debug: false; gravity: -9.8; driver: local" renderer="antialias: true; colorManagement: true;">
        <a-assets>
            <a-asset-item id="tree-obj" src="assets/Tree/Tree.obj"></a-asset-item>
            <a-asset-item id="tree-mtl" src="assets/Tree/Tree.mtl"></a-asset-item>
            <a-asset-item id="tree1-obj" src="assets/Tree1ByTyroSmith/Tree1.obj"></a-asset-item>
            <a-asset-item id="tree1-mtl" src="assets/Tree1ByTyroSmith/Tree1.mtl"></a-asset-item>
            <a-asset-item id="circ-grass-obj" src="assets/10438_Circular_Grass_Patch_v1_L3.123c72c0e679-bb4b-4162-b0f0-a70f7575d7d8/10438_Circular_Grass_Patch_v1_iterations-2.obj"></a-asset-item>
            <a-asset-item id="circ-grass-mtl" src="assets/10438_Circular_Grass_Patch_v1_L3.123c72c0e679-bb4b-4162-b0f0-a70f7575d7d8/10438_Circular_Grass_Patch_v1_iterations-2.mtl"></a-asset-item>
            <a-asset-item id="rect-grass-obj" src="assets/10450_Rectangular_Grass_Patch_L3.123c827d110a-1347-4381-9208-e4f735762647/10450_Rectangular_Grass_Patch_v1_iterations-2.obj"></a-asset-item>
            <a-asset-item id="rect-grass-mtl" src="assets/10450_Rectangular_Grass_Patch_L3.123c827d110a-1347-4381-9208-e4f735762647/10450_Rectangular_Grass_Patch_v1_iterations-2.mtl"></a-asset-item>
        </a-assets>
        
        <!-- Beautiful Skybox via downloaded asset -->
        <a-sky src="assets/sky.jpg"></a-sky>
        
        <!-- Soft, Realistic Lighting -->
        <!-- The Sun -->
        <a-light type="directional" position="30 50 -20" target="#rig" castShadow="true" intensity="1.2" 
                 shadow="cameraVisible: false; mapSize: 4096; cameraRight: 60; cameraLeft: -60; cameraTop: 60; cameraBottom: -60; bias: -0.001"></a-light>
        <!-- Soft Ambient/Bounce Light -->
        <a-light type="hemisphere" color="#ffffff" groundColor="#3a702b" intensity="0.4"></a-light>

        <!-- Environment Elements -->
        <a-entity procedural-terrain></a-entity>
        <a-entity grass-sprites></a-entity>
        <a-entity forest-generator></a-entity>

        <!-- Tee Box Area -->
        <a-entity obj-model="obj: #rect-grass-obj; mtl: #rect-grass-mtl" position="0 0.01 -0.5" rotation="-90 0 0" scale="0.02 0.02 0.02" shadow="receive: true; cast: true"></a-entity>
        <a-cylinder position="0 0.02 -0.5" radius="0.005" height="0.04" color="#d2b48c"></a-cylinder>



        <!-- The Hole (Z = -80) -->
        <a-entity position="0 0.01 -80">
            <!-- Circular Grass Patch -->
            <a-entity obj-model="obj: #circ-grass-obj; mtl: #circ-grass-mtl" position="0 -0.01 0" rotation="-90 0 0" scale="0.02 0.02 0.02" shadow="receive: true; cast: true"></a-entity>
            <a-cylinder position="0 1 0" radius="0.015" height="2" color="#fff" shadow="cast: true"></a-cylinder>
            <a-triangle position="0.3 1.8 0" vertex-a="0 0.2 0" vertex-b="0 -0.2 0" vertex-c="-0.3 0 0" color="#ff2222" side="double" shadow="cast: true"></a-triangle>
            <a-cylinder position="0 0.01 0" radius="0.1" height="0.02" color="#000"></a-cylinder>
        </a-entity>

        <!-- VR Rig -->
        <a-entity id="rig" position="0 0 1">
            <!-- Camera -->
            <a-camera position="0 1.6 0" wasd-controls="enabled: false">
                <!-- Attach the cannon to the camera for desktop mode -->
                <a-entity id="desktop-cannon" position="0.2 -0.2 -0.4" rotation="0 0 0" visible="true" golf-cannon>
                    <!-- Metallic barrel -->
                    <a-cylinder position="0 0 0" rotation="90 0 0" radius="0.03" height="0.4" color="#778899" metalness="0.8" roughness="0.2"></a-cylinder>
                    <!-- Cannon base/grip -->
                    <a-box position="0 -0.05 0.15" width="0.04" height="0.1" depth="0.04" color="#222"></a-box>
                </a-entity>
            </a-camera>
            
            <!-- Attach the cannon script directly to the controller so it accurately gets the normal tracking line -->
            <a-entity laser-controls="hand: left"></a-entity>
            <a-entity laser-controls="hand: right" golf-cannon>
                <!-- Cosmetic cannon model attached to the hand -->
                <a-entity position="0 0 0" rotation="0 0 0">
                    <a-cylinder position="0 0 -0.2" rotation="90 0 0" radius="0.04" height="0.5" color="#778899" metalness="0.8" roughness="0.2" shadow="cast: true"></a-cylinder>
                    <a-box position="0 -0.05 0" width="0.05" height="0.15" depth="0.05" color="#222"></a-box>
                </a-entity>
            </a-entity>
        </a-entity>
        
    </a-scene>

    <script>
        // Hide desktop cannon when entering VR
        document.querySelector('a-scene').addEventListener('enter-vr', function () {
            document.querySelector('#desktop-cannon').setAttribute('visible', 'false');
            // Remove golf-cannon from desktop to prevent double firing
            document.querySelector('#desktop-cannon').removeAttribute('golf-cannon');
        });
        document.querySelector('a-scene').addEventListener('exit-vr', function () {
            document.querySelector('#desktop-cannon').setAttribute('visible', 'true');
            document.querySelector('#desktop-cannon').setAttribute('golf-cannon', '');
        });

        // Spawn initial ball on the tee box once the scene is loaded
        const scene = document.querySelector('a-scene');
        const spawnTeeBall = () => {
            const newBall = document.createElement('a-sphere');
            newBall.setAttribute('radius', '0.043');
            newBall.setAttribute('color', '#ffffff');
            newBall.setAttribute('shadow', 'cast: true');
            newBall.setAttribute('golf-ball', {
                velocity: {x: 0, y: 0, z: 0},
                trailColor: '#ff3366'
            });
            newBall.setAttribute('dynamic-body', 'mass: 0.045; shape: sphere; sphereRadius: 0.043; bounce: 0.4; friction: 0.7; linearDamping: 0.2; angularDamping: 0.5');
            newBall.setAttribute('position', '0 0.15 -0.5');
            scene.appendChild(newBall);
        };
        
        if (scene.hasLoaded) {
            spawnTeeBall();
        } else {
            scene.addEventListener('loaded', spawnTeeBall);
        }
    </script>
</body>
</html>
